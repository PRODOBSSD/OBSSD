<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<meta charset="UTF-8">
<meta name="description" content="Kits created by New Zealand based producer and visual artist OBSSD">
<title>PRODUCERS</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png" sizes="96x96" type="image/png">
<link rel="stylesheet" href="obssd_shared/custom.css">
<link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Cascadia Code', monospace;
  background: #ffffff;
  margin: 0;
  padding: 30px 30px 0 30px;
  min-height: 100vh;
  width: 100vw;
  box-sizing: border-box;
}

.logo-container {
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
}

.logo-img {
  max-width: 380px;
  cursor: pointer;
  transition: transform 0.22s;
}

.logo-img:hover {
  transform: scale(1.06);
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 32px;
  max-width: 1000px;
  margin: 0 auto;
}

.product-card {
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.product-image {
  width: 300px;
  height: 300px;
  object-fit: cover;
  margin-bottom: 18px;
  background: #eee;
}

/* ✅ UPDATED PRODUCT BUTTON */
.product-name-btn {
  width: 100%;
  aspect-ratio: 758 / 112;
  margin-bottom: 10px;
  padding: 0;

  color: #3a3a3a;
  border: 1px solid #000;
  background-color: #000; /* fallback */

  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 1.1em;
  cursor: pointer;
  transition: filter 0.16s;
}

.product-name-btn:hover {
  filter: brightness(0.95);
}

.product-footer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.price {
  font-size: 1.15em;
  font-weight: bold;
}

/* ✅ OUTLINE-ONLY PREVIEW BUTTON */
.demo-btn {
  padding: 7px 18px;
  background: transparent;
  color: #3a3a3a;
  border: 1px solid #000;
  font-size: 1em;
  cursor: pointer;
}

/* Signup banner (unchanged visually except unsubscribe texture support) */
#loop-signup-banner {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #fff;
  text-align: center;
  padding: 0.5em 0;
}

#loop-signup-banner input {
  padding: 0.35em;
  font-family: 'Cascadia Code', monospace;
}

.subscribe-btn {
  background: #cccecb;
  color: #fff;
  border: none;
  padding: 0.35em 1.1em;
  cursor: pointer;
}

/* unsubscribe still textured */
.unsubscribe-btn {
  background-color: #000;
  color: #3a3a3a;
  border: none;

  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
}
</style>
</head>

<body>

<div class="logo-container">
  <a href="https://obssd.online/">
    <img class="logo-img" src="obssd_assets/OBSSD_LOGO.png">
  </a>
</div>

<div class="product-grid">

  <div class="product-card">
    <img class="product-image" src="https://pe56d.s3.amazonaws.com/o_1je101kbl1nso6nrlk6vfl18261a.jpg">
    <button class="product-name-btn" onclick="window.open('https://mobworld.cc/b/eAOqc')">AFTERLIFE - Drum Kit</button>
    <div class="product-footer">
      <span class="price">$29.99</span>
      <button class="demo-btn" onclick="window.open('https://www.youtube.com/watch?v=ou7k948SDCk')">PREVIEW</button>
    </div>
  </div>

  <div class="product-card">
    <img class="product-image" src="https://pe56d.s3.amazonaws.com/o_1ip0g986k1dajkvbs4j6vo85110.jpg">
    <button class="product-name-btn" onclick="window.open('https://mobworld.cc/b/wn5aG')">REBIRTH - Drum Kit</button>
    <div class="product-footer">
      <span class="price">$24.99</span>
      <button class="demo-btn" onclick="window.open('https://www.youtube.com/watch?v=2FOAM6TxeaU')">PREVIEW</button>
    </div>
  </div>

</div>

<script>
// ✅ UPDATED TEXTURE SYSTEM
window.addEventListener('load', () => {

  const overlays = [
    '/obssd_assets/BUTTON_OVERLAY_OBSSD.jpg',
    '/obssd_assets/BUTTON_OVERLAY2_OBSSD.jpg'
  ];

  // ONLY apply to product + unsubscribe
  const elems = document.querySelectorAll('.product-name-btn, .unsubscribe-btn');

  elems.forEach(el => {
    const img = overlays[Math.floor(Math.random() * overlays.length)];
    el.style.backgroundImage = `url("${img}")`;
  });

});
</script>

</body>
</html>
