<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="description" content="OBSSD is a New Zealand based producer and visual artist.">
<title>OBSSD</title>

<link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  background: none !important;
}
body {
  min-height: 100vh;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ✅ Fade setup */
spline-viewer {
  flex: 1;
  width: 100vw;
  height: 100vh;
  display: block;
  opacity: 0;
  transition: opacity 0.8s ease;
}
spline-viewer.loaded {
  opacity: 1;
}

/* TITLE */
.obssd-title {
  position: fixed;
  top: 20px;
  left: 0;
  z-index: 1002;
}
.obssd-title img {
  width: 380px;
}
@media (max-width: 1500px) {
  .obssd-title { display: none !important; }
}

/* CONTACT (restored) */
.contact-section {
  position: fixed;
  right: 16px;
  bottom: 0;
  z-index: 1001;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
}
.contact-image-container {
  position: relative;
  display: block;
  width: 320px;
  pointer-events: auto;
}
.contact-image {
  width: 100%;
  display: block;
}
.contact-links {
  font-family: 'Cascadia Code', monospace;
  color: #3a3a3a;
  font-size: 1rem;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  text-align: center;
  bottom: 2%;
  pointer-events: auto;
  line-height: 2.1;
}
.contact-links a {
  color: #3a3a3a;
  text-decoration: none;
  margin: 0 1px;
  font-weight: 700;
}
.contact-links a:hover {
  color: #000;
}
@media (max-width: 500px) {
  .contact-section { right: 4px; }
  .contact-image-container { width: 200px; }
  .contact-links { bottom: 8%; }
}
</style>

<script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.2/build/spline-viewer.js"></script>
</head>

<body>

<div class="obssd-title">
  <img src="obssd_assets/OBSSD_TITLE.png">
</div>

<div class="contact-section">
  <div class="contact-image-container">
    <img src="obssd_assets/CONTACT_TITLE.png" class="contact-image">
    <div class="contact-links">
      <div>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=prodobssd@gmail.com&su=To OBSSD" target="_blank">email</a>
        <a href="https://www.instagram.com/imobssd/" target="_blank">instagram</a>
        <a href="https://www.youtube.com/@PRODOBSSD" target="_blank">youtube</a>
      </div>
      <div>
        <a href="https://soundcloud.com/imobssd" target="_blank">soundcloud</a>
        <a href="https://vgen.co/obssd" target="_blank">vgen</a>
      </div>
    </div>
  </div>
</div>

<!-- SPLINE -->
<spline-viewer id="splineScene" url="https://prod.spline.design/85d942QVoJTXmM1Y/scene.splinecode"></spline-viewer>

<!-- Logo removal -->
<script>
function removeSplineLogo() {
  const interval = setInterval(() => {
    const viewer = document.querySelector('spline-viewer');
    if (viewer && viewer.shadowRoot) {
      const logo = viewer.shadowRoot.querySelector('#logo');
      if (logo) {
        logo.remove();
        clearInterval(interval);
      }
    }
  }, 500);
}
removeSplineLogo();
</script>

<!-- Fade-in handler -->
<script>
function handleFadeIn(viewer) {
  // wait a moment for scene to render
  setTimeout(() => {
    viewer.classList.add('loaded');
  }, 300);
}

document.addEventListener("DOMContentLoaded", () => {
  const viewer = document.getElementById("splineScene");
  handleFadeIn(viewer);
});
</script>

<!-- Restart logic -->
<script>
function restartSpline() {
  const oldViewer = document.getElementById('splineScene');
  if (!oldViewer) return;

  const parent = oldViewer.parentNode;
  const newViewer = document.createElement('spline-viewer');

  newViewer.setAttribute('id', 'splineScene');
  newViewer.setAttribute('url', oldViewer.getAttribute('url'));

  parent.replaceChild(newViewer, oldViewer);

  // reset fade
  newViewer.classList.remove('loaded');

  // reapply behaviors
  removeSplineLogo();
  handleFadeIn(newViewer);
}

window.addEventListener("pageshow", (event) => {
  const navEntry = performance.getEntriesByType("navigation")[0];

  if (event.persisted || navEntry?.type === "back_forward") {
    restartSpline();
  }
});
</script>

</body>
</html>
