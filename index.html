<style>
html, body {
  height: 100%;
  margin: 0;

body {
  height: 100vh;

spline-viewer {

.obssd-title {
  position: fixed;

  left: 0;

.obssd-title img {

@media (max-width: 1500px) {

.contact-section {
  position: fixed;
  right: 16px;
  bottom: 0;
  z-index: 1001;
}
.contact-image-container {
  position: relative;
  width: 320px;
}
.contact-links {
  font-family: 'Cascadia Code', monospace;
  font-size: 1rem;
  position: absolute;
  left: 50%;

  bottom: 2%;

  color: #3a3a3a;
  text-decoration: none;

<script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.2/build/spline-viewer.js"></script>

<body>

<div class="obssd-title">

</div>

  <div class="contact-image-container">
    <img src="obssd_assets/CONTACT_TITLE.png">

      <div>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=prodobssd@gmail.com&su=To OBSSD" target="_blank">email</a>

      </div>

        <a href="https://vgen.co/obssd" target="_blank">vgen</a>
      </div>
    </div>
  </div>
</div>

<!-- Spline -->
<spline-viewer id="splineScene" url="https://prod.spline.design/85d942QVoJTXmM1Y/scene.splinecode"></spline-viewer>

<!-- Remove Spline logo -->
<script>
const interval = setInterval(() => {
  const viewer = document.querySelector('spline-viewer');
  if (viewer && viewer.shadowRoot) {
    const logo = viewer.shadowRoot.querySelector('#logo');
    if (logo) {
      logo.remove();
      clearInterval(interval);
    }
  }
}, 500);
</script>

<!-- ✅ FINAL FIX -->
<script>
function restartSpline() {
  const oldViewer = document.getElementById('splineScene');
  if (!oldViewer) return;

  const parent = oldViewer.parentNode;
  const newViewer = document.createElement('spline-viewer');

  newViewer.setAttribute('id', 'splineScene');
  newViewer.setAttribute('url', oldViewer.getAttribute('url'));

  parent.replaceChild(newViewer, oldViewer);
}

window.addEventListener("pageshow", (event) => {
  const navEntry = performance.getEntriesByType("navigation")[0];

  if (
    event.persisted ||
    navEntry?.type === "back_forward"
  ) {
    restartSpline();
  }
});
</script>

</body>
