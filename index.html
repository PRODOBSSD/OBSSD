<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="description" content="OBSSD is a New Zealand based producer and visual artist. Explore a range of beats, kits, and loops on the OBSSD ONLINE website! To get in contact send me a message [...]">
  <title>OBSSD</title>
  <link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png" sizes="96x96" type="image/png">
  <link rel="stylesheet" href="obssd_shared/custom.css">
  <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: none !important;
    }
    body {
      min-height: 100vh;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: none !important;
    }
    spline-viewer {
      flex: 1 1 0%;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: auto !important;
      pointer-events: auto !important;
      border: none;
      margin: 0;
      padding: 0;
      background: none !important;
    }
    .obssd-title {
      position: fixed;
      top: 20px;
      left: 0;
      z-index: 1002;
    }
    .obssd-title img {
      width: 380px;
      height: auto;
    }
    @media (max-width: 1500px) {
      .obssd-title {
        display: none !important;
      }
    }
    .contact-section {
      position: fixed;
      right: 16px;
      bottom: 0;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .contact-image-container {
      position: relative;
      width: 320px;
      pointer-events: auto;
    }
    .contact-image {
      width: 100%;
    }
    .contact-links {
      font-family: 'Cascadia Code', monospace;
      color: #3a3a3a;
      font-size: 1rem;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      bottom: 2%;
      pointer-events: auto;
      line-height: 2.1;
    }
    .contact-links a {
      color: #3a3a3a;
      text-decoration: none;
      font-weight: 700;
    }
    .contact-links a:hover {
      color: #000;
    }
  </style>

  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.2/build/spline-viewer.js"></script>
</head>

<body>

  <div class="obssd-title">
    <img src="obssd_assets/OBSSD_TITLE.png" alt="OBSSD Title">
  </div>

  <div class="contact-section">
    <div class="contact-image-container">
      <img src="obssd_assets/CONTACT_TITLE.png" class="contact-image">
      <div class="contact-links">
        <div>
          <a href="https://mail.google.com/mail/?view=cm&fs=1&to=prodobssd@gmail.com&su=To OBSSD" target="_blank">email</a>
          <a href="https://www.instagram.com/imobssd/" target="_blank">instagram</a>
          <a href="https://www.youtube.com/@PRODOBSSD" target="_blank">youtube</a>
        </div>
        <div>
          <a href="https://soundcloud.com/imobssd" target="_blank">soundcloud</a>
          <a href="https://vgen.co/obssd" target="_blank">vgen</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Spline viewer -->
  <spline-viewer id="splineScene" url="https://prod.spline.design/85d942QVoJTXmM1Y/scene.splinecode"></spline-viewer>

  <script>
    const interval = setInterval(() => {
      const viewer = document.querySelector('spline-viewer');
      if (viewer && viewer.shadowRoot) {
        const logo = viewer.shadowRoot.querySelector('#logo');
        if (logo) {
          logo.remove();
          clearInterval(interval);
        }
      }
    }, 500);
  </script>

  <!-- ✅ FIX: Restart animation on back navigation -->
  <script>
    function restartSpline() {
      const viewer = document.getElementById('splineScene');
      if (viewer) {
        const currentURL = viewer.getAttribute('url');
        viewer.setAttribute('url', ''); // clear
        setTimeout(() => {
          viewer.setAttribute('url', currentURL); // reload scene
        }, 50);
      }
    }

    window.addEventListener("pageshow", (event) => {
      if (event.persisted) {
        restartSpline();
      }
    });
  </script>

</body>
</html>
