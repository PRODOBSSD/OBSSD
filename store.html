<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORE</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png">

<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #F8F5F5;
  font-family: Arial, sans-serif;
  color: #000;
  padding: 30px 40px 0;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
}

.logo-img {
  max-width: 340px;
  cursor: pointer;
  transition: 0.25s;
}
.logo-img:hover {
  transform: scale(1.05);
}

/* GRID (FULL WIDTH LIKE VISUALS) */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 28px;
}

/* PRODUCT ITEM */
.product-card {
  display: flex;
  flex-direction: column;

  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;

  transition: transform 0.2s ease;
}

/* IMAGE */
.product-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  transition: filter 0.25s ease;
}

.product-card:hover .product-image {
  filter: brightness(0.75);
}

/* TITLE BUTTON (kept your style but cleaner) */
.product-name-btn {
  width: 100%;
  aspect-ratio: 758 / 112;
  margin-top: 8px;
  margin-bottom: 8px;

  background-image: url("obssd_assets/BUTTON_OVERLAY_OBSSD.jpg");
