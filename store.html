<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #fdfdfd;
  font-family: Arial, sans-serif;
  color: #000;
  padding: 30px 40px 0;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
}

.logo-img {
  max-width: 340px;
  width: 100%;
  cursor: pointer;
  transition: 0.25s;
}

.logo-img:hover {
  transform: scale(1.05);
}

/* GRID */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 48px;
}

/* PRODUCT */
.product-card {
  display: flex;
  flex-direction: column;
  gap: 10px;

  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;
}

/* IMAGE WRAPPER */
.product-image-wrapper {
  position: relative;
  cursor: pointer;
  width: 100%;
}

/* IMAGE */
.product-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  transition: filter 0.25s ease;
}

/* OVERLAY */
.product-overlay {
  position: absolute;
  inset: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(0,0,0,0.4);
  color: #fff;

  font-size: clamp(0.9rem, 1vw, 1.2rem);
  text-align: center;
  padding: 14px;

  opacity: 0;
  transition: opacity 0.25s ease;
}

/* HOVER EFFECT */
.product-image-wrapper:hover .product-image {
  filter: brightness(0.7);
}

.product-image-wrapper:hover .product-overlay {
  opacity: 1;
}

/* TITLE BUTTON */
.product-name-btn {
  width: 100%;
  height: 100%;
  aspect-ratio: 755 / 220;

  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
  background-color: transparent;

  border: none;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0;
  margin-top: 4px;

  position: relative;
  overflow: hidden;
}

/* BUTTON TEXT */
.product-name-btn-text {
  font-family: 'Allegiance';

  /* Resizes naturally like price text */
  font-size: clamp(1.4rem, 1.7vw, 2.4rem);

  display: inline-block;

  transform: scaleX(1.7);

  color: #000;
  text-align: center;

  /* Slightly lower positioning */
  position: relative;
  top: 5%;

  line-height: 1;
  white-space: nowrap;
}

/* FOOTER */
.product-footer {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 2px;
}

/* PRICE */
.price {
  text-align: center;
  width: 100%;
}

.price span {
  font-size: clamp(1.15rem, 1.4vw, 1.8rem);
  font-weight: 700;
}

/* ANIMATION */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* MOBILE */
@media (max-width: 768px) {
  body {
    padding: 20px 20px 0;
  }

  .product-grid {
    gap: 36px;
  }

  .price span {
    font-size: clamp(1rem, 4vw, 1.4rem);
  }
}
</style>
</head>

<script>
// Array of button overlay images
const buttonOverlays = [
  'obssd_assets/BUTTON_OVERLAY_1.png',
  'obssd_assets/BUTTON_OVERLAY_2.png',
  'obssd_assets/BUTTON_OVERLAY_3.png'
];

// Random overlay picker
function getRandomButtonOverlay() {
  return buttonOverlays[Math.floor(Math.random() * buttonOverlays.length)];
}

// Apply animation delay + overlays
document.querySelectorAll('.product-card').forEach((el, i) => {
  el.style.animationDelay = (i * 0.05) + 's';

  const button = el.querySelector('.product-name-btn');

  if (button) {
    button.style.backgroundImage = `url("${getRandomButtonOverlay()}")`;
  }
});
</script>
