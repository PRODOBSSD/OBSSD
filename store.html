<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORE</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png">

<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #F8F5F5;
  font-family: Arial, sans-serif;
  color: #000;
  padding: 30px 40px 0;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
}

.logo-img {
  max-width: 340px;
  cursor: pointer;
  transition: 0.25s;
}
.logo-img:hover {
  transform: scale(1.05);
}

/* CONTAINER (NEW — controls width) */
.store-container {
  max-width: 1100px;
  margin: 0 auto;
}

/* GRID */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 36px;
}

/* PRODUCT */
.product-card {
  display: flex;
  flex-direction: column;

  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;

  transition: transform 0.2s ease;
}

.product-card:hover {
  transform: translateY(-4px);
}

/* IMAGE */
.product-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  cursor: pointer;
}

/* TITLE BUTTON */
.product-name-btn {
  width: 100%;
  aspect-ratio: 758 / 112;
  margin-top: 10px;
  margin-bottom: 10px;

  background-image: url("obssd_assets/BUTTON_OVERLAY_OBSSD.jpg");
  background-size: cover;
  background-position: center;

  border: 0.5px solid #000;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.product-name-btn-text {
  font-family: 'Allegiance';
  font-size: 1.35em; /* INCREASED */
  display: inline-block;
  transform: scaleX(1.5);
  transform-origin: center;
}

/* FOOTER */
.product-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* PRICE */
.price span {
  display: inline-block;
  transform: scaleY(1.3);
  transform-origin: center;
  font-size: 0.85em;
}

/* BUTTON */
.demo-btn {
  background: none;
  border: 0.5px solid #000;
  padding: 6px 14px;
  cursor: pointer;
  font-size: 0.8em;
}

/* ANIMATION */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
  <a href="https://obssd.online/">
    <img src="obssd_assets/OBSSD_LOGO.png" class="logo-img">
  </a>
</div>

<div class="store-container">

  <div class="product-grid">

    <div class="product-card">
      <img class="product-image" src="https://payhip.com/cdn-cgi/image/format=auto,width=1500/https://pe56d.s3.amazonaws.com/o_1je101kbl1nso6nrlk6vfl18261a.jpg">
      <button class="product-name-btn" onclick="window.open('https://mobworld.cc/b/eAOqc', '_blank')">
        <span class="product-name-btn-text">AFTERLIFE - Drum Kit</span>
      </button>
      <div class="product-footer">
        <div class="price"><span>$29.99</span></div>
        <button class="demo-btn" onclick="window.open('https://www.youtube.com/watch?v=ou7k948SDCk', '_blank')">PREVIEW</button>
      </div>
    </div>

    <div class="product-card">
      <img class="product-image" src="https://payhip.com/cdn-cgi/image/format=auto,width=1500/https://pe56d.s3.amazonaws.com/o_1ip0g986k1dajkvbs4j6vo85110.jpg">
      <button class="product-name-btn" onclick="window.open('https://mobworld.cc/b/wn5aG', '_blank')">
        <span class="product-name-btn-text">REBIRTH - Drum Kit</span>
      </button>
      <div class="product-footer">
        <div class="price"><span>$24.99</span></div>
        <button class="demo-btn" onclick="window.open('https://www.youtube.com/watch?v=2FOAM6TxeaU', '_blank')">PREVIEW</button>
      </div>
    </div>

    <div class="product-card">
      <img class="product-image" src="https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1ivup4icn16rr3a4if0gbu1up810.jpg">
      <button class="product-name-btn" onclick="window.open('https://www.instagram.com/p/DL_6Z46zVBd/', '_blank')">
        <span class="product-name-btn-text">TAKEOVER - Loop Kit</span>
      </button>
      <div class="product-footer">
        <div class="price"><span>FREE</span></div>
        <button class="demo-btn" onclick="window.open('https://www.youtube.com/watch?v=2GKE7hhT-94', '_blank')">PREVIEW</button>
      </div>
    </div>

    <div class="product-card">
      <img class="product-image" src="obssd_assets/5K @imobssd.png">
      <button class="product-name-btn" onclick="window.open('https://www.instagram.com/p/DQI0S1yEltV/', '_blank')">
        <span class="product-name-btn-text">5K - Drum Kit</span>
      </button>
      <div class="product-footer">
        <div class="price"><span>FREE</span></div>
        <button class="demo-btn" onclick="window.open('https://www.instagram.com/p/DQI0S1yEltV/', '_blank')">PREVIEW</button>
      </div>
    </div>

  </div>

</div>

<script>
document.querySelectorAll('.product-card').forEach((el, i) => {
  el.style.animationDelay = (i * 0.05) + 's';
});
</script>

</body>
</html>
