<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORE</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png">

<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #F8F5F5;
  font-family: Arial, sans-serif;
  color: #000;
  padding: 30px 40px 0;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
}

.logo-img {
  max-width: 340px;
  cursor: pointer;
  transition: 0.25s;
}
.logo-img:hover {
  transform: scale(1.05);
}

/* GRID (FULL WIDTH LIKE VISUALS) */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 28px;
}

/* PRODUCT ITEM */
.product-card {
  display: flex;
  flex-direction: column;

  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;

  transition: transform 0.2s ease;
}

/* IMAGE */
.product-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  transition: filter 0.25s ease;
}

.product-card:hover .product-image {
  filter: brightness(0.75);
}

/* TITLE BUTTON (kept your style but cleaner) */
.product-name-btn {
  width: 100%;
  aspect-ratio: 758 / 112;
  margin-top: 8px;
  margin-bottom: 8px;

  background-image: url("obssd_assets/BUTTON_OVERLAY_OBSSD.jpg");
  background-size: cover;
  background-position: center;

  border: 0.5px solid #000;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.product-name-btn-text {
  font-family: 'Allegiance';
  font-size: clamp(1.2rem, 1.2vw, 1.8rem);
  display: inline-block;
  transform: scaleX(1.5);
}

/* FOOTER */
.product-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 4px;
}

/* PRICE (vertical stretch like visuals meta) */
.price span {
  display: inline-block;
  transform: scaleY(1.3);
  transform-origin: center;
  font-size: clamp(0.95rem, 1vw, 1.3rem);
  font-weight: 700;
}

/* BUTTON */
.demo-btn {
  background: #fff; /* pure white */
  border: 0.5px solid #000;
  padding: clamp(8px, 0.9vw, 12px) clamp(14px, 1.2vw, 20px);
  cursor: pointer;
  font-size: clamp(0.85rem, 0.9vw, 1.1rem);
  font-weight: normal;
  transition: filter 0.15s ease;
}

.demo-btn:hover {
  filter: brightness(0.92);
}

/* ANIMATION */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
  <a href="https://obssd.online/">
    <img src="obssd_assets/OBSSD_LOGO.png" class="logo-img">
  </a>
</div>

<!-- GRID -->
<div class="product-grid">

  <!-- ITEM -->
  <div class="product-card">

<script>
document.querySelectorAll('.product-card').forEach((el, i) => {
  el.style.animationDelay = (i * 0.05) + 's';
});
</script>

</body>
</html>
