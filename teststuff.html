<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISUALS</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png">

<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #F8F5F5;
  font-family: Arial, sans-serif;
  color: #000;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  padding: 30px 0;
}

.logo-img {
  max-width: 340px;
  cursor: pointer;
  transition: 0.25s;
}
.logo-img:hover {
  transform: scale(1.05);
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 28px;
  padding: 0 40px 40px;
}

/* ITEM */
.item {
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;
  transition: transform 0.2s ease;
}

.item:hover {
  transform: translateY(-4px);
}

/* IMAGE */
.thumb {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  cursor: zoom-in;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* NO SCALING */
.thumb:hover img {
  filter: brightness(70%);
}

/* CLICK FEEDBACK */
.thumb:active {
  transform: scale(0.98);
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 0.8em;
  opacity: 0;
  transition: opacity 0.25s ease;
}

.thumb:hover .overlay {
  opacity: 1;
}

/* META ROW */
.meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
  font-size: 0.75em;
  gap: 8px;
}

/* TITLE */
.title {
  font-family: 'Allegiance';
  font-size: 1.6em; /* increased for balance */
}

/* TEXT ALIGNMENT */
.title { text-align: left; }
.date { text-align: center; }
.type { text-align: right; }

/* STRETCH SYSTEM */

/* TITLE (Allegiance - horizontal stretch ONLY) */
.title span {
  display: inline-block;
  transform: scaleX(1.5);
  transform-origin: left;
  white-space: nowrap;
}

/* DATE + TYPE (Arial - vertical stretch ONLY) */
.date span,
.type span {
  display: inline-block;
  transform: scaleY(1.3);
  transform-origin: center;
  white-space: nowrap;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.lightbox.active {
  opacity: 1;
  pointer-events: all;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

/* ANIMATION */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="logo-container">
  <a href="https://obssd.online/">
    <img src="/obssd_assets/OBSSD_LOGO.png" class="logo-img">
  </a>
</div>

<div class="gallery">

  <!-- IMAGE ITEM -->
  <div class="item">
    <div class="thumb" onclick="openLightbox(this)">
      <img src="/obssd_work/work1.jpg">
      <div class="overlay">VIEW</div>
    </div>
    <div class="meta">
      <div class="title"><span>Mobeats Visualizer</span></div>
      <div class="date"><span>2025</span></div>
      <div class="type"><span>Animation</span></div>
    </div>
  </div>

  <!-- LINK ITEM -->
  <div class="item">
    <div class="thumb" onclick="openLink('https://youtube.com/')">
      <img src="/obssd_work/work2.jpg">
      <div class="overlay">VIEW</div>
    </div>
    <div class="meta">
      <div class="title"><span>Afterlife Visualizer</span></div>
      <div class="date"><span>2025</span></div>
      <div class="type"><span>3D</span></div>
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(el) {
  const img = el.querySelector('img');
  const box = document.getElementById('lightbox');
  const lightImg = document.getElementById('lightbox-img');

  lightImg.src = img.src;
  box.classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

function openLink(url) {
  window.open(url, '_blank');
}

/* STAGGER LOAD */
document.querySelectorAll('.item').forEach((el, i) => {
  el.style.animationDelay = (i * 0.05) + 's';
});
</script>

</body>
</html>
