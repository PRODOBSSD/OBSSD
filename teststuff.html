<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Music portfolio">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MUSIC</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png" sizes="96x96" type="image/png">
<link rel="stylesheet" href="obssd_shared/custom.css">

<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #fdfdfd;
  font-family: Arial, sans-serif;
  color: #000;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  padding: 30px 0;
}

.logo-img {
  max-width: 340px;
  cursor: pointer;
  transition: 0.25s;
}
.logo-img:hover {
  transform: scale(1.05);
}

/* SECTION TITLE */
.section-title {
  padding: 10px 40px 0;
  font-size: 0.8em;
  letter-spacing: 1px;
}

/* =========================
   COMMISSION CAROUSEL
========================= */

.carousel {
  display: flex;
  overflow-x: auto;
  gap: 18px;
  padding: 20px 40px 40px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.carousel::-webkit-scrollbar {
  display: none;
}

.card {
  flex: 0 0 auto;
  width: 260px;
  aspect-ratio: 1 / 1;
  position: relative;
  scroll-snap-align: start;
  cursor: pointer;
  overflow: hidden;
  background: #000;
  border-radius: 2px;
  animation: fadeUp 0.6s ease forwards;
  opacity: 0;
  transform: translateY(20px);
}

/* thumbnail */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.25s;
}

/* overlay */
.card .overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.35);
  color: #fff;
  font-size: 0.8em;
  opacity: 0;
  transition: 0.25s;
}

.card:hover img {
  filter: brightness(60%);
}

.card:hover .overlay {
  opacity: 1;
}

/* =========================
   VIDEO LIGHTBOX
========================= */

.video-lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.25s;
  z-index: 999;
}

.video-lightbox.active {
  opacity: 1;
  pointer-events: all;
}

.video-box {
  width: 80vw;
  max-width: 900px;
  aspect-ratio: 16 / 9;
}

.video-box iframe {
  width: 100%;
  height: 100%;
}

/* =========================
   BEATSTARS
========================= */

.beatstars-section {
  padding: 20px 40px 60px;
}

.beatstars-embed {
  width: 100%;
  height: 650px;
}

.beatstars-embed iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

/* ANIMATION */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
  <a href="https://obssd.online/">
    <img src="/obssd_assets/OBSSD_LOGO.png" class="logo-img">
  </a>
</div>

<!-- COMMISSIONS -->
<div class="section-title">MUSIC COMMISSIONS</div>

<div class="carousel">

  <div class="card" onclick="openVideo('https://www.youtube.com/embed/fiIwhJZmwr4')">
    <img src="obssd_work/mobeats_healyou_@imobssd.webp">
    <div class="overlay">PLAY</div>
  </div>

  <div class="card" onclick="openVideo('https://www.youtube.com/embed/Y68mjK2Typs')">
    <img src="obssd_work/mobeats_champion_@imobssd.webp">
    <div class="overlay">PLAY</div>
  </div>

  <div class="card" onclick="openVideo('https://www.youtube.com/embed/CfTFY0MDc3c')">
    <img src="obssd_work/conic_cover_@imobssd.webp">
    <div class="overlay">PLAY</div>
  </div>

  <div class="card" onclick="openVideo('https://www.youtube.com/embed/jlS8YdcC5OE')">
    <img src="obssd_work/pareidolia_social_@imobssd.webp">
    <div class="overlay">PLAY</div>
  </div>

  <div class="card" onclick="openVideo('https://www.youtube.com/embed/SSbpC3ukOTA')">
    <img src="obssd_work/kujo_gon3_@imobssd.webp">
    <div class="overlay">PLAY</div>
  </div>

</div>

<!-- BEATSTARS -->
<div class="section-title">BEAT STORE</div>

<div class="beatstars-section">
  <div class="beatstars-embed">
    <iframe 
      src="https://player.beatstars.com/?storeId=150661"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>
</div>

<!-- VIDEO LIGHTBOX -->
<div class="video-lightbox" id="videoLightbox" onclick="closeVideo()">
  <div class="video-box" onclick="event.stopPropagation()">
    <iframe id="videoFrame" src="" allow="autoplay; fullscreen"></iframe>
  </div>
</div>

<script>
function openVideo(url) {
  document.getElementById('videoFrame').src = url + "?autoplay=1";
  document.getElementById('videoLightbox').classList.add('active');
}

function closeVideo() {
  document.getElementById('videoFrame').src = "";
  document.getElementById('videoLightbox').classList.remove('active');
}

/* stagger animation */
document.querySelectorAll('.card').forEach((el, i) => {
  el.style.animationDelay = (i * 0.05) + 's';
});
</script>

</body>
</html>
