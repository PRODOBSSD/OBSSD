<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Music portfolio">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MUSIC</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png" sizes="96x96" type="image/png">

<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #fdfdfd;
  font-family: Arial, sans-serif;
  color: #000;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  padding: 30px 0;
}

.logo-img {
  max-width: 340px;
  cursor: pointer;
  transition: 0.25s;
}
.logo-img:hover {
  transform: scale(1.05);
}

/* =========================
   SECTION TITLE (LARGER)
========================= */

.section-title {
  padding: 10px 40px 0;
  font-family: 'Allegiance';
  font-size: 1.6em; /* increased */
}

.section-title span {
  display: inline-block;
  transform: scaleX(1.5);
  transform-origin: left;
  white-space: nowrap;
}

/* =========================
   CAROUSEL
========================= */

.carousel {
  display: flex;
  overflow-x: auto;
  gap: 18px;
  padding: 20px 40px 40px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.carousel::-webkit-scrollbar {
  display: none;
}

.card {
  flex: 0 0 auto;
  width: 260px;
  aspect-ratio: 1 / 1;
  position: relative;
  scroll-snap-align: start;
  overflow: hidden;
  cursor: pointer;
  background: #000;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: 0.2s;
}

.card:hover img {
  filter: brightness(70%);
}

/* overlay */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.35);
  color: #fff;
  font-size: 0.8em;
  opacity: 0;
  transition: 0.2s;
}

.card:hover .overlay {
  opacity: 1;
}

/* =========================
   BEATSTARS (BALANCED SIZE)
========================= */

.beatstars-section {
  padding: 20px 40px 70px;
}

.beatstars-embed {
  width: 100%;
  height: 72vh; /* balanced (between old + new) */
  min-height: 520px;
  max-height: 780px;
}

.beatstars-embed iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

/* =========================
   SOCIALS
========================= */

.socials {
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 40px 0 60px;
}

.socials a {
  color: black;
  transition: 0.2s;
}

.socials a:hover {
  transform: scale(1.15);
}

.icon {
  width: 26px;
  height: 26px;
  fill: black;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
  <a href="https://obssd.online/">
    <img src="/obssd_assets/OBSSD_LOGO.png" class="logo-img">
  </a>
</div>

<!-- COMMISSIONS -->
<div class="section-title"><span>MUSIC COMMISSIONS</span></div>

<div class="carousel">

  <div class="card" onclick="openLink('https://www.youtube.com/watch?v=fiIwhJZmwr4')">
    <img src="obssd_work/mobeats_healyou_@imobssd.webp">
    <div class="overlay">VIEW</div>
  </div>

  <div class="card" onclick="openLink('https://www.youtube.com/watch?v=Y68mjK2Typs')">
    <img src="obssd_work/mobeats_champion_@imobssd.webp">
    <div class="overlay">VIEW</div>
  </div>

  <div class="card" onclick="openLink('https://www.youtube.com/watch?v=CfTFY0MDc3c')">
    <img src="obssd_work/conic_cover_@imobssd.webp">
    <div class="overlay">VIEW</div>
  </div>

  <div class="card" onclick="openLink('https://www.youtube.com/watch?v=jlS8YdcC5OE')">
    <img src="obssd_work/pareidolia_social_@imobssd.webp">
    <div class="overlay">VIEW</div>
  </div>

</div>

<!-- BEAT STORE -->
<div class="section-title"><span>BEAT STORE</span></div>

<div class="beatstars-section">
  <div class="beatstars-embed">
    <iframe 
      src="https://player.beatstars.com/?storeId=150661"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>
</div>

<!-- SOCIALS -->
<div class="socials">

  <!-- Spotify -->
  <a href="#" target="_blank">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm5.5 17.3c-.2.3-.6.4-.9.2-2.5-1.5-5.6-1.8-9.2-.9-.4.1-.7-.2-.8-.5-.1-.4.2-.7.5-.8 3.9-.9 7.4-.5 10.2 1.1.4.2.4.6.2.9zm1.3-2.9c-.3.4-.8.5-1.2.2-3-1.8-7.6-2.3-11.2-1.2-.5.1-1-.2-1.1-.7-.1-.5.2-1 .7-1.1 4.1-1.2 9.2-.7 12.6 1.4.4.3.5.8.2 1.2zm.1-3c-3.6-2.1-9.6-2.3-13-.9-.6.2-1.2-.1-1.4-.7-.2-.6.1-1.2.7-1.4 4-1.4 10.6-1.2 14.8 1.2.5.3.6 1 .3 1.5-.3.5-1 .6-1.4.3z"/>
    </svg>
  </a>

  <!-- SoundCloud -->
  <a href="#" target="_blank">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M11 9v8h7c2.2 0 4-1.8 4-4s-1.8-4-4-4c-.3 0-.6 0-.9.1C16.6 6.4 14 5 11 5v4zM4 17h2V7H4v10zm-3 0h2V9H1v8z"/>
    </svg>
  </a>

  <!-- VGen -->
  <a href="#" target="_blank">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M3 3h18v18H3V3zm4 14h2l3-10h-2l-2 7-2-7H4l3 10zm8-10h2v10h-2V7z"/>

</div>

<script>
function openLink(url) {
  window.open(url, '_blank');
}
</script>

</body>
</html>
