<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISUALS</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png">

<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #F8F5F5;
  font-family: Arial, sans-serif;
  color: #000;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  padding: 30px 0;
}

.logo-img {
  max-width: 340px;
  cursor: pointer;
  transition: 0.25s;
}
.logo-img:hover {
  transform: scale(1.05);
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
  padding: 0 40px 40px;
}

/* ITEM */
.item {
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.item:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

/* IMAGE */
.thumb {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  cursor: zoom-in;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease, filter 0.3s ease;
}

.thumb:hover img {
  transform: scale(1.05);
  filter: brightness(70%);
}

/* CLICK FEEDBACK */
.thumb:active {
  transform: scale(0.97);
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 0.9em;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
}

.thumb:hover .overlay {
  opacity: 1;
  transform: translateY(0);
}

/* META */
.meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.75em;
  margin-top: 6px;
}

.meta span {
  display: inline-block;
  transform: scaleX(1.5);
  transform-origin: center;
  font-weight: bold;
  letter-spacing: 0.05em;
}

/* TITLE */
.title {
  font-family: 'Allegiance';
  font-size: 0.85em;
}

.title span {
  display: inline-block;
  transform: scaleX(1.5);
  transform-origin: center;
}

/* ALIGNMENT */
.date {
  text-align: center;
  flex: 1;
}

.type {
  text-align: right;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.lightbox.active {
  opacity: 1;
  pointer-events: all;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  transform: scale(0.9);
  transition: transform 0.25s ease;
}

.lightbox.active img {
  transform: scale(1);
}

/* ANIMATION */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="logo-container">
  <a href="https://obssd.online/">
    <img src="/obssd_assets/OBSSD_LOGO.png" class="logo-img">
  </a>
</div>

<div class="gallery">

  <!-- IMAGE ITEM -->
  <div class="item">
    <div class="thumb" onclick="openLightbox('/obssd_work/work1.jpg')">
      <img src="/obssd_work/work1.jpg">
      <div class="overlay">click to view</div>
    </div>
    <div class="meta">
      <div class="title"><span>Mobeats Visualizer</span></div>
      <div class="date"><span>2025</span></div>
      <div class="type"><span>Animation</span></div>
    </div>
  </div>

  <!-- LINK ITEM -->
  <div class="item">
    <div class="thumb" onclick="openLink('https://youtube.com/')">
      <img src="/obssd_work/work2.jpg">
      <div class="overlay">click to view</div>
    </div>
    <div class="meta">
      <div class="title"><span>Afterlife Visualizer</span></div>
      <div class="date"><span>2025</span></div>
      <div class="type"><span>3D</span></div>
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
  const box = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = src;
  box.classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

function openLink(url) {
  window.open(url, '_blank');
}

/* STAGGER LOAD */
document.querySelectorAll('.item').forEach((el, i) => {
  el.style.animationDelay = (i * 0.05) + 's';
});
</script>

</body>
</html>
