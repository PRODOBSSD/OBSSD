<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MUSIC</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png">

<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #fdfdfd;
  font-family: Arial, sans-serif;
}

/* TITLE */
.section-title {
  padding: 10px 40px;
  font-family: 'Allegiance';
  font-size: 1.6em;
}

.section-title span {
  display: inline-block;
  transform: scaleX(1.5);
  transform-origin: left;
}

/* CAROUSEL */
.carousel {
  display: flex;
  overflow-x: auto;
  gap: 18px;
  padding: 20px 40px;
}

.carousel::-webkit-scrollbar {
  display: none;
}

/* SQUARE CARD */
.card {
  width: 320px;
  height: 320px;
  flex: 0 0 auto;
  position: relative;
  overflow: hidden;
  background: black;
}

/* =========================
   FIXED YOUTUBE SYSTEM
========================= */

/* wrapper keeps 16:9 correct */
.video-frame {
  position: absolute;
  top: 50%;
  left: 50%;

  width: 100%;
  height: 180%; /* forces vertical crop */

  transform: translate(-50%, -50%);
}

/* iframe stays native */
.video-frame iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

/* overlay */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.35);
  color: white;
  font-size: 0.8em;
  opacity: 0;
  transition: 0.2s;
  pointer-events: none;
}

.card:hover .overlay {
  opacity: 1;
}

/* BEATSTARS */
.beatstars-section {
  padding: 20px 40px 70px;
}

.beatstars-embed {
  height: 72vh;
  min-height: 520px;
}

.beatstars-embed iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

/* SOCIALS */
.socials {
  display: flex;
  justify-content: center;
  gap: 25px;
  font-size: 12px;
  padding: 40px 0 60px;
}

.socials a {
  color: black;
  text-decoration: none;
  transform: scaleY(1.25);
  display: inline-block;
}
</style>
</head>

<body>

<div class="section-title"><span>MUSIC COMMISSIONS</span></div>

<div class="carousel">

  <div class="card">
    <div class="video-frame">
      <iframe src="https://www.youtube.com/embed/CwgNxq1GEng?rel=0"
        allowfullscreen></iframe>
    </div>
    <div class="overlay">VIEW</div>
  </div>

  <div class="card">
    <div class="video-frame">
      <iframe src="https://www.youtube.com/embed/Y68mjK2Typs?rel=0"
        allowfullscreen></iframe>
    </div>
    <div class="overlay">VIEW</div>
  </div>

  <div class="card">
    <div class="video-frame">
      <iframe src="https://www.youtube.com/embed/CfTFY0MDc3c?rel=0"
        allowfullscreen></iframe>
    </div>
    <div class="overlay">VIEW</div>
  </div>

</div>

<div class="section-title"><span>BEAT STORE</span></div>

<div class="beatstars-section">
  <div class="beatstars-embed">
    <iframe src="https://player.beatstars.com/?storeId=150661"></iframe>
  </div>
</div>

<div class="socials">
  <a href="#">SPOTIFY</a>
  <a href="#">SOUNDCLOUD</a>
  <a href="#">VGEN</a>
</div>

</body>
</html>
