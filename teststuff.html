<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Music portfolio">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MUSIC</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png" sizes="96x96" type="image/png">

<style>
@font-face {
  font-family: 'Allegiance';
  src: url('/obssd_assets/allegiance.otf') format('opentype');
}

body {
  margin: 0;
  background: #fdfdfd;
  font-family: Arial, sans-serif;
  color: #000;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  padding: 30px 0;
}

.logo-img {
  max-width: 340px;
  cursor: pointer;
  transition: 0.25s;
}
.logo-img:hover {
  transform: scale(1.05);
}

/* SECTION TITLE */
.section-title {
  padding: 10px 40px 0;
  font-family: 'Allegiance';
  font-size: 1.6em;
}

.section-title span {
  display: inline-block;
  transform: scaleX(1.5);
  transform-origin: left;
  white-space: nowrap;
}

/* CAROUSEL */
.carousel {
  display: flex;
  overflow-x: auto;
  gap: 18px;
  padding: 20px 40px 40px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.carousel::-webkit-scrollbar {
  display: none;
}

/* RESPONSIVE CARD (FIX IS HERE) */
.card {
  flex: 0 0 auto;
  width: clamp(240px, 28vw, 340px);
  aspect-ratio: 1 / 1;
  position: relative;
  scroll-snap-align: start;
  overflow: hidden;
  background: #000;
  cursor: pointer;
  border-radius: 0;
}

/* iframe now properly fills card */
.card iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* overlay */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.35);
  color: #fff;
  font-size: 0.8em;
  opacity: 0;
  transition: 0.2s;
}

.card:hover .overlay {
  opacity: 1;
}

/* BEATSTARS */
.beatstars-section {
  padding: 20px 40px 70px;
}

.beatstars-embed {
  width: 100%;
  height: 72vh;
  min-height: 520px;
  max-height: 780px;
}

.beatstars-embed iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

/* SOCIALS */
.socials {
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 40px 0 60px;
  font-size: 12px;
  letter-spacing: 1px;
}

.socials a {
  color: black;
  text-decoration: none;
  display: inline-block;
  transform: scaleY(1.25);
  transition: 0.2s;
}

.socials a:hover {
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
  <a href="https://obssd.online/">
    <img src="/obssd_assets/OBSSD_LOGO.png" class="logo-img">
  </a>
</div>

<!-- COMMISSIONS -->
<div class="section-title"><span>MUSIC COMMISSIONS</span></div>

<div class="carousel">

  <div class="card">
    <iframe src="https://www.youtube.com/embed/pgJQw0UT2oo?si=sgGayW7p-Ds0SHlY" allowfullscreen></iframe>
  </div>
  
  <div class="card">
    <iframe src="https://www.youtube.com/embed/hvbJdreAlu4?si=cGBX7mVOyzdfwnAe" allowfullscreen></iframe>
  </div>
  
  <div class="card">
    <iframe src="https://www.youtube.com/embed/CGVWFii0uJY?si=Gp3rqeGfJYKbgPmu" allowfullscreen></iframe>
  </div>
  
  <div class="card">
    <iframe src="https://www.youtube.com/embed/CwgNxq1GEng?rel=0" allowfullscreen></iframe>
  </div>

  <div class="card">
    <iframe src="https://www.youtube.com/embed/49euGyoaeMw?si=K-9ksIwy5ZVaT--1" allowfullscreen></iframe>
  </div>

</div>

<!-- BEAT STORE -->
<div class="section-title"><span>BEAT STORE</span></div>

<div class="beatstars-section">
  <div class="beatstars-embed">
    <iframe 
      src="https://player.beatstars.com/?storeId=150661"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>
</div>

<!-- SOCIALS -->
<div class="socials">
  <a href="https://spotify.com" target="_blank">SPOTIFY</a>
  <a href="https://soundcloud.com" target="_blank">SOUNDCLOUD</a>
  <a href="https://vgen.co" target="_blank">VGEN</a>
</div>

</body>
</html>
