<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Contact & Commissions">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>CONTACT</title>
  <link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png" sizes="96x96" type="image/png">
  <link rel="stylesheet" href="obssd_shared/custom.css">

<style>
body {
  margin: 0;
  background: #1a1919;
  font-family: Arial, sans-serif;
  color: #e8e4d9;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  padding: 30px 0;
}

.logo-img {
  max-width: 340px;
  cursor: pointer;
  transition: 0.25s;
}

.logo-img:hover {
  transform: scale(1.05);
}

/* FORM CONTAINER */
.form-container {
  display: flex;
  justify-content: center;
  padding: 0 20px 40px 20px;
  animation: fadeUp 0.6s ease forwards;
}

.form-container iframe {
  max-width: 700px;
  width: 100%;
  border: none;
  border-radius: 4px;
  overflow: hidden;
}

/* SOCIAL LINKS CONTAINER */
.social-links-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px 15px 20px 15px;
  font-family: Arial, sans-serif;
  transform: scaleY(1.25);
}

.social-link {
  font-family: Arial, sans-serif;
  font-stretch: expanded;
  font-size: 16px;
  text-decoration: none;
  color: #e8e4d9;
  transition: 0.25s;
  letter-spacing: 0.05em;
}

.social-link:hover {
  transform: scale(1.05);
  color: #333;
}

/* ANIMATION */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .form-container {
    padding: 0 15px 40px 15px;
  }
  
  .form-container iframe {
    max-width: 100%;
  }

  .social-links-container {
    flex-wrap: wrap;
    gap: 15px;
    padding: 30px 15px 40px 15px;
  }

  .social-link {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="logo-container">
  <a href="https://obssd.online/">
    <img src="/obssd_assets/OBSSD_TITLE.png" class="logo-img">
  </a>
</div>

<div class="social-links-container">
  <a href="https://mail.google.com/mail/?view=cm&fs=1&to=prodobssd@gmail.com&su=To OBSSD" class="social-link" target="_blank">email</a>
  <a href="https://www.instagram.com/imobssd/" class="social-link" target="_blank">instagram</a>
  <a href="https://www.youtube.com/@PRODOBSSD" class="social-link" target="_blank">youtube</a>
  <a href="https://soundcloud.com/imobssd" class="social-link" target="_blank">soundcloud</a>
  <a href="https://vgen.co/obssd" class="social-link" target="_blank">vgen</a>
</div>

<div class="form-container">
  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfBw-lqVBAzSqbkk5_UYONDkz7Z53eiNQPJI15KOQdmQxZAVg/viewform?embedded=true" width="700" frameborder="0" marginheight="0" marginwidth="0"></iframe>
</div>

<script>
// Logo click navigation (same as other pages)
document.querySelector('.logo-img').addEventListener('click', function(e) {
  e.preventDefault();
  window.location.href = 'https://obssd.online/';
});

// Dynamically adjust iframe height to fit all content
const iframe = document.querySelector('.form-container iframe');

// Set initial larger height to allow content to load
iframe.setAttribute('height', '2000');

// Listen for messages from iframe (Google Forms sends resize events)
window.addEventListener('message', function(event) {
  if (event.origin !== 'https://docs.google.com') return;
  
  if (event.data.type === 'embed_size') {
    iframe.setAttribute('height', event.data.height);
  }
});

// Fallback: Try to access iframe content after load and adjust
iframe.addEventListener('load', function() {
  try {
    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
    const height = iframeDoc.body.scrollHeight;
    if (height) {
      iframe.setAttribute('height', height + 50);
    }
  } catch(e) {
    // Cross-origin restriction - use larger default
    console.log('Unable to access iframe content (cross-origin)');
  }
});

// Also set a reasonable fallback height
setTimeout(function() {
  if (!iframe.getAttribute('height') || iframe.getAttribute('height') === '1395') {
    iframe.setAttribute('height', '2000');
  }
}, 2000);
</script>

</body>
</html>
