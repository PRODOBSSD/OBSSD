<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSIC</title>

<link rel="icon" href="/obssd_assets/OBSSD_FAVICON_96.png">

<style>
body {
  margin: 0;
  background: #fdfdfd;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* PAGE WRAPPER */
.nav-container {
  width: 100%;
  display: flex;
  flex-direction: column;
}

/* ROW ITEM */
.nav-item {
  position: relative;
  width: 100%;
  height: 33.33vh;
  min-height: 220px;
  overflow: hidden;
  cursor: pointer;

  opacity: 0;
  transform: translateY(25px);
  animation: fadeUp 0.7s ease forwards;
}

/* BACKGROUND IMAGE */
.nav-item img.bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease, filter 0.4s ease;
}

/* DARK OVERLAY FOR TEXT READABILITY */
.nav-item::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0);
  z-index: 1;
}

/* CENTER TEXT LOGO */
.nav-item img.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 720px;
  width: 60%;
  z-index: 2;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* HOVER EFFECTS */
.nav-item:hover img.bg {
  transform: scale(1.05);
  filter: brightness(0.8);
}

.nav-item:hover img.text {
  transform: translate(-50%, -50%) scale(1.05);
}

/* CLICK FEEDBACK */
.nav-item:active {
  transform: scale(0.99);
}

/* ANIMATION */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* STAGGER DELAY */
.nav-item:nth-child(1) { animation-delay: 0.05s; }
.nav-item:nth-child(2) { animation-delay: 0.15s; }
.nav-item:nth-child(3) { animation-delay: 0.25s; }

/* MOBILE TWEAK */
@media (max-width: 600px) {
  .nav-item {
    height: 30vh;
  }

  .nav-item img.text {
    width: 75%;
  }
}
</style>
</head>

<body>

<div class="nav-container">

  <!-- SOUNDTRACKS -->
  <div class="nav-item" onclick="window.open('https://vgen.co/obssd/portfolio', '_blank')">
    <img class="bg" src="/obssd_assets/WEB_Soundtracks_Background.jpg">
    <img class="text" src="/obssd_assets/WEB_Soundtracks_Text.png">
  </div>

  <!-- BEATS -->
  <div class="nav-item" onclick="location.href='https://obssd.online/beats'">
    <img class="bg" src="/obssd_assets/WEB_Beats_Background.jpg">
    <img class="text" src="/obssd_assets/WEB_Beats_Text.png">
  </div>

  <!-- SONGS -->
  <div class="nav-item" onclick="window.open('https://soundcloud.com/imobssd', '_blank')">
    <img class="bg" src="/obssd_assets/WEB_Songs_Background.jpg">
    <img class="text" src="/obssd_assets/WEB_Songs_Text.png">
  </div>

</div>

</body>
</html>
